<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF a Imagen - Convertidor Online</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-primary" data-bs-theme="dark">
        <div class="container-fluid px-3">
            <span class="navbar-brand mb-0 h1">
                <i class="bi bi-file-pdf"></i> PDF a Imagen
            </span>
        </div>
    </nav>

    <main class="container-fluid px-3 py-3 app-shell">
        <div class="row g-3 h-100">
            <section class="col-12 col-lg-4 h-100">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column gap-3">
                        <div>
                            <h2 class="h5 mb-1">Convertidor PDF a Imagen</h2>
                            <p class="text-muted mb-0">Sin scroll vertical en escritorio</p>
                        </div>

                        <div>
                            <label for="pdfInput" class="form-label upload-label w-100 mb-0">
                                <input type="file" id="pdfInput" accept=".pdf" style="display: none;">
                                <div class="upload-box p-4 text-center rounded-3 bg-white">
                                    <i class="bi bi-cloud-arrow-up fs-1 text-primary d-block mb-2"></i>
                                    <p class="h6 mb-1">Haz clic o arrastra un PDF</p>
                                    <small class="text-muted">Máximo 50 MB</small>
                                </div>
                            </label>
                        </div>

                        <div id="optionsSection" style="display: none;">
                            <div class="mb-2">
                                <label for="quality" class="form-label mb-1">Calidad</label>
                                <select id="quality" class="form-select form-select-sm">
                                    <option value="1">Baja (150 DPI)</option>
                                    <option value="1.5">Media (225 DPI)</option>
                                    <option value="2" selected>Alta (300 DPI)</option>
                                    <option value="3">Muy alta (450 DPI)</option>
                                </select>
                            </div>

                            <div class="mb-2">
                                <label for="pageRange" class="form-label mb-1">Paginas</label>
                                <select id="pageRange" class="form-select form-select-sm">
                                    <option value="all" selected>Todas</option>
                                    <option value="custom">Personalizado</option>
                                </select>
                                <input type="text" id="customPages" class="form-control form-control-sm mt-2" placeholder="ej: 1,3,5-7" style="display: none;">
                            </div>

                            <div class="form-check mb-3">
                                <input class="form-check-input" type="checkbox" id="combineImages" checked>
                                <label class="form-check-label" for="combineImages">Descargar como ZIP</label>
                            </div>

                            <button id="convertBtn" class="btn btn-primary w-100">
                                <i class="bi bi-arrow-repeat"></i> Convertir
                            </button>
                        </div>

                        <div id="progressSection" style="display: none;">
                            <div class="progress" style="height: 24px;">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" id="progressFill" role="progressbar" style="width: 0%"></div>
                            </div>
                            <p class="small text-muted mb-0 mt-2" id="progressText">Procesando: 0%</p>
                        </div>

                        <div id="errorMsg" style="display: none;">
                            <div class="alert alert-danger py-2 px-3 mb-0 d-flex align-items-center justify-content-between" role="alert">
                                <span id="errorText"></span>
                                <button type="button" class="btn-close" onclick="document.getElementById('errorMsg').style.display='none'"></button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <section class="col-12 col-lg-8 h-100" id="resultsSection" style="display: none;">
                <div class="card h-100 shadow-sm">
                    <div class="card-body d-flex flex-column">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h3 class="h6 mb-0">Imagenes generadas</h3>
                            <div class="btn-group btn-group-sm">
                                <button id="downloadBtn" class="btn btn-success">
                                    <i class="bi bi-download"></i> ZIP
                                </button>
                                <button id="resetBtn" class="btn btn-secondary">
                                    <i class="bi bi-arrow-clockwise"></i>
                                </button>
                            </div>
                        </div>
                        <div class="gallery-scroll flex-grow-1">
                            <div id="gallery"></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal para vista previa -->
    <div class="modal" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Imagen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img id="modalImage" src="" alt="Imagen" class="w-100">
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Cargar PDF.js desde CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Para descargar como ZIP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- Para guardar archivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
